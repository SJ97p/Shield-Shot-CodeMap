<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shield & Shot Code Map</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.6/dist/mermaid.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">System Design Portfolio</p>
      <h1>Shield & Shot Code Map</h1>
    </div>
    <nav class="toplinks" aria-label="External links">
      <a href="https://youtu.be/p6IyCVZkcaY" target="_blank" rel="noreferrer">Demo Video</a>
      <a href="https://github.com/sj97p/Shield-Shot-CodeMap" target="_blank" rel="noreferrer">GitHub</a>
      <button id="theme-toggle" type="button" title="Toggle theme">White</button>
    </nav>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <div class="panel-head">
        <h2>Explorer</h2>
      </div>
      <div id="tree" class="tree"></div>
    </aside>

    <section class="main-panel">
      <div class="panel-head graph-head">
        <div>
          <h2 id="node-title">Overview</h2>
          <p id="node-summary"></p>
        </div>
        <div class="graph-tools">
          <button id="nav-back" class="back-button" type="button" title="Go back" disabled>Back</button>
          <div class="zoom-controls" aria-label="Graph zoom controls">
            <button id="zoom-out" type="button" title="Zoom out">-</button>
            <button id="zoom-reset" type="button" title="Reset zoom">100%</button>
            <button id="zoom-in" type="button" title="Zoom in">+</button>
          </div>
        </div>
      </div>
      <div id="graph-wrap" class="graph-wrap">
        <div id="graph" class="mermaid"></div>
      </div>

      <section class="detail-grid">
        <article class="detail-card">
          <h3>설계 의도</h3>
          <p id="intent"></p>
        </article>
        <article class="detail-card">
          <h3>진행 중 고민 / 초기 구조의 한계</h3>
          <p id="issue"></p>
        </article>
        <article class="detail-card">
          <h3>최종 구조</h3>
          <p id="final"></p>
        </article>
        <article class="detail-card">
          <h3>아쉬운 점과 다음 개선</h3>
          <p id="next"></p>
        </article>
      </section>

      <section class="script-section">
        <div class="section-head">
          <h2>Core Scripts</h2>
          <p>선택한 시스템을 구성하는 핵심 스크립트입니다. 클래스명을 누르면 상세 다이어그램으로 이동합니다.</p>
        </div>
        <div id="script-list" class="script-list"></div>
      </section>

      <section class="evidence-section">
        <div class="section-head">
          <h2>Evidence</h2>
          <p>GIF/이미지를 클릭하면 크게 볼 수 있습니다.</p>
        </div>
        <div id="evidence" class="evidence-grid"></div>
      </section>
    </section>

    <aside class="code-panel">
      <div class="panel-head">
        <div>
          <h2>Code Preview</h2>
          <p id="code-path"></p>
        </div>
      </div>
      <div id="code-actions" class="code-actions"></div>
      <pre id="code-preview" class="code-preview"><code>왼쪽 Explorer 또는 그래프 노드에서 시스템/클래스를 선택하세요.</code></pre>
    </aside>
  </main>

  <dialog id="media-modal" class="media-modal">
    <button id="modal-close" class="modal-close" type="button">Close</button>
    <img id="modal-image" alt="" />
    <p id="modal-caption"></p>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
